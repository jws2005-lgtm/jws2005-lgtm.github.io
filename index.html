<!DOCTYPE html>
<html>
<head>
  <title>A New World</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      width: 100%;
      height: 100vh;
      background-image: url('images/nasa-Q1p7bh3SHj8-unsplash.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: 80px;
      box-sizing: border-box;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to top,
          rgba(0,0,0,0.82) 0%,
          rgba(0,0,0,0.35) 45%,
          rgba(0,0,0,0.05) 100%
        );
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 700px;
      animation: fadeUp 1.5s ease;
    }

    .content h1 {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.05em;
      margin: 0;
      line-height: 0.95;
    }

    .content p {
      margin-top: 20px;
      font-size: clamp(1rem, 2vw, 1.4rem);
      line-height: 1.7;
      color: rgba(255,255,255,0.9);
    }

    /* QR section */
    .qr-section {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
    }

    .qr-image {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border: 8px solid white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
    }

    .qr-text {
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: rgba(255,255,255,0.92);
    }

    .section {
      min-height: 100vh;
      padding: 120px 10vw;
      background: #050505;
      display: flex;
      align-items: center;
    }

    .section h2 {
      font-size: clamp(2rem, 5vw, 4rem);
      margin-bottom: 20px;
    }

    .section p {
      font-size: 1.2rem;
      line-height: 1.8;
      max-width: 700px;
      color: rgba(255,255,255,0.85);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="content">
      <h1>A New World</h1>

      <p>
        Explore the future beyond the horizon.
      </p>

      <div class="qr-section">
        <img
          class="qr-image"
          src="https://github.com/user-attachments/assets/16f9895f-2942-4955-94b6-f578abf4964f"
          alt="QR Code"
          />
        <div class="qr-text">Scan to download the new app</div>
      </div>
    </div>
  </section>

  <section class="section">
    <div>
      <h2>The Journey Begins</h2>

      <p>
        Humanity stands at the edge of a new era — where technology,
        imagination, and exploration reshape the future of our world.
      </p>
    </div>
  </section>

</body>
</html>
